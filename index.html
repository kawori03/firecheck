<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>火の確認</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1c1c1e">
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
  }
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #f0ede8; font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; }

  .app { max-width: 430px; margin: 0 auto; min-height: 100vh; background: #faf9f6; display: flex; flex-direction: column; }

  .status-bar { background: #1c1c1e; color: #fff; font-size: 12px; padding: 10px 18px 8px; display: flex; justify-content: space-between; flex-shrink: 0; }

  .header { background: #1c1c1e; color: #fff; padding: 20px 20px 18px; }
  .header-title { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
  .header-sub { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 3px; }

  .content { flex: 1; padding: 20px 16px; overflow-y: auto; }

  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: #888; text-transform: uppercase; margin-bottom: 10px; }

  /* PHOTO BOX */
  .photo-box { width: 100%; height: 220px; border-radius: 16px; background: #eee; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; position: relative; overflow: hidden; border: 2px dashed #ccc; }
  .photo-box.has-photo { border: none; }
  .photo-box img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .photo-cam { font-size: 36px; }
  .photo-hint { font-size: 14px; color: #999; }
  .photo-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%); }
  .photo-stamp { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px 14px; color: #fff; display: flex; justify-content: space-between; align-items: flex-end; font-size: 12px; }
  .photo-stamp-label { font-size: 11px; opacity: 0.7; }
  .photo-stamp-dt { font-size: 13px; font-weight: 500; }
  .saved-badge { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.45); color: #fff; font-size: 11px; padding: 4px 10px; border-radius: 20px; }

  /* CHECK */
  .check-section { margin-top: 16px; }
  .check-item { display: flex; align-items: center; gap: 14px; padding: 18px 16px; background: #fff; border-radius: 14px; border: 1.5px solid #e8e5df; cursor: pointer; transition: all 0.18s; user-select: none; }
  .check-item.checked { background: #f0f9f0; border-color: #4caf6e; }
  .check-circle { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #ccc; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; color: transparent; transition: all 0.18s; }
  .check-item.checked .check-circle { background: #4caf6e; border-color: #4caf6e; color: #fff; }
  .check-text { font-size: 16px; color: #1c1c1e; }
  .check-item.checked .check-text { color: #2d7a47; }

  /* DONE STATE */
  .done-banner { margin-top: 16px; background: #f0f9f0; border: 1.5px solid #4caf6e; border-radius: 14px; padding: 16px; display: none; }
  .done-banner.show { display: block; }
  .done-banner-top { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .done-banner-icon { font-size: 22px; }
  .done-banner-title { font-size: 16px; font-weight: 600; color: #2d7a47; }
  .done-banner-dt { font-size: 13px; color: #4caf6e; }

  /* CTA */
  .cta { padding: 16px; background: #faf9f6; border-top: 1px solid #eee; flex-shrink: 0; }
  .btn-main { width: 100%; padding: 16px; border-radius: 14px; font-size: 17px; font-weight: 600; border: none; cursor: pointer; background: #1c1c1e; color: #fff; transition: opacity 0.15s, transform 0.1s; letter-spacing: -0.3px; margin-bottom: 10px; }
  .btn-main:disabled { background: #e5e3df; color: #aaa; cursor: default; }
  .btn-main:not(:disabled):active { transform: scale(0.98); }
  .btn-clear { width: 100%; padding: 13px; border-radius: 14px; font-size: 15px; font-weight: 500; border: 1.5px solid #e8e5df; cursor: pointer; background: #fff; color: #888; display: none; }
  .btn-clear.show { display: block; }
  .cta-hint { font-size: 12px; color: #aaa; text-align: center; margin-top: 8px; }

  /* CAMERA MODAL */
  .camera-modal { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; flex-direction: column; }
  .camera-modal.open { display: flex; }
  .camera-modal video { width: 100%; flex: 1; object-fit: cover; display: block; }
  .camera-controls { display: flex; gap: 12px; padding: 24px 20px; background: #111; justify-content: center; align-items: center; }
  .btn-cancel-cam { padding: 12px 24px; border-radius: 30px; border: 1.5px solid #fff; background: transparent; color: #fff; font-size: 15px; cursor: pointer; }
  .btn-capture { width: 72px; height: 72px; border-radius: 50%; border: 5px solid #fff; background: #fff; font-size: 30px; cursor: pointer; }
</style>
</head>
<body>
<div class="app">
  <div class="status-bar">
    <span id="sb-time"></span>
    <span id="sb-date"></span>
  </div>

  <div class="header">
    <div class="header-title">出発前チェック</div>
    <div class="header-sub">写真を撮って確認してから出発しよう</div>
  </div>

  <div class="content">
    <div class="section-label">ガスコンロの写真</div>
    <div class="photo-box" id="photo-box">
      <div class="photo-cam" id="photo-cam">📷</div>
      <div class="photo-hint" id="photo-hint">下のボタンから撮影</div>
      <img id="preview-img" style="display:none;" alt="ガスコンロの写真" />
      <div class="photo-overlay" id="photo-overlay" style="display:none;"></div>
      <div class="photo-stamp" id="photo-stamp" style="display:none;">
        <div>
          <div class="photo-stamp-label">ガスコンロ</div>
          <div class="photo-stamp-dt" id="stamp-dt"></div>
        </div>
      </div>
      <div class="saved-badge" id="saved-badge" style="display:none;">前回の写真</div>
    </div>

    <div style="margin-top:12px;">
      <button id="btn-camera" style="width:100%; padding:15px; border-radius:12px; font-size:16px; font-weight:600; border:none; cursor:pointer; background:#1c1c1e; color:#fff;">📷 カメラで撮影</button>
    </div>

    <div class="check-section">
      <div class="section-label" style="margin-top:20px;">確認</div>
      <div class="check-item" id="check-item" onclick="toggleCheck()">
        <div class="check-circle" id="check-circle"></div>
        <span class="check-text">ガスコンロの火を消した</span>
      </div>
    </div>

    <div class="done-banner" id="done-banner">
      <div class="done-banner-top">
        <span class="done-banner-icon">✅</span>
        <span class="done-banner-title">確認しました、大丈夫です</span>
      </div>
      <div class="done-banner-dt" id="done-banner-dt"></div>
    </div>
  </div>

  <div class="cta">
    <button class="btn-main" id="btn-exit" disabled onclick="goToDone()">出発する</button>
    <button class="btn-clear" id="btn-clear" onclick="clearAll()">翌日用にリセットする</button>
    <div class="cta-hint" id="cta-hint">写真撮影とチェックが必要です</div>
  </div>
</div>

<!-- CAMERA MODAL -->
<div class="camera-modal" id="camera-modal">
  <video id="camera-video" autoplay playsinline muted></video>
  <div class="camera-controls">
    <button class="btn-cancel-cam" id="btn-cancel-cam">キャンセル</button>
    <button class="btn-capture" id="btn-capture">📷</button>
  </div>
  <canvas id="camera-canvas" style="display:none;"></canvas>
</div>

<script>
const LS_PHOTO = 'firecheck_photo';
const LS_DATETIME = 'firecheck_datetime';

let photoDataUrl = null;
let isChecked = false;
let doneTime = null;
let cameraStream = null;

function fmtDatetime(d) {
  const week = ['日','月','火','水','木','金','土'];
  return d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate() +
    '(' + week[d.getDay()] + ') ' + d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
}
function fmtTime(d) { return d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0'); }
function fmtDateShort(d) {
  const week = ['日','月','火','水','木','金','土'];
  return (d.getMonth()+1) + '/' + d.getDate() + '(' + week[d.getDay()] + ')';
}

function updateStatusBar() {
  const now = new Date();
  document.getElementById('sb-time').textContent = fmtTime(now);
  document.getElementById('sb-date').textContent = fmtDateShort(now);
}
updateStatusBar();
setInterval(updateStatusBar, 15000);

function showPhotoUI(src, isSaved, dt) {
  document.getElementById('preview-img').src = src;
  document.getElementById('preview-img').style.display = 'block';
  document.getElementById('photo-cam').style.display = 'none';
  document.getElementById('photo-hint').style.display = 'none';
  document.getElementById('photo-overlay').style.display = 'block';
  document.getElementById('photo-stamp').style.display = 'flex';
  document.getElementById('saved-badge').style.display = isSaved ? 'block' : 'none';
  document.getElementById('photo-box').classList.add('has-photo');
  if (dt) document.getElementById('stamp-dt').textContent = fmtDatetime(dt);
}

function updateBtn() {
  const ready = photoDataUrl && isChecked;
  const hasDone = !!doneTime;
  document.getElementById('btn-exit').disabled = !ready || hasDone;
  document.getElementById('btn-exit').style.display = hasDone ? 'none' : 'block';
  document.getElementById('btn-clear').classList.toggle('show', hasDone);
  document.getElementById('done-banner').classList.toggle('show', hasDone);
  const hint = document.getElementById('cta-hint');
  if (hasDone) { hint.textContent = ''; return; }
  if (ready) hint.textContent = '準備完了です';
  else if (!photoDataUrl && !isChecked) hint.textContent = '写真撮影とチェックが必要です';
  else if (!photoDataUrl) hint.textContent = '写真を撮ってください';
  else hint.textContent = 'チェックを入れてください';
}

function toggleCheck() {
  if (doneTime) return;
  isChecked = !isChecked;
  document.getElementById('check-item').classList.toggle('checked', isChecked);
  document.getElementById('check-circle').textContent = isChecked ? '✓' : '';
  updateBtn();
}

function goToDone() {
  doneTime = new Date();
  try { localStorage.setItem(LS_DATETIME, doneTime.toISOString()); } catch(e) {}
  document.getElementById('done-banner-dt').textContent = fmtDatetime(doneTime) + ' に確認済み';
  updateBtn();
}

function clearAll() {
  photoDataUrl = null; isChecked = false; doneTime = null;
  try { localStorage.removeItem(LS_PHOTO); } catch(e) {}
  try { localStorage.removeItem(LS_DATETIME); } catch(e) {}
  document.getElementById('preview-img').style.display = 'none';
  document.getElementById('preview-img').src = '';
  document.getElementById('photo-cam').style.display = '';
  document.getElementById('photo-hint').style.display = '';
  document.getElementById('photo-overlay').style.display = 'none';
  document.getElementById('photo-stamp').style.display = 'none';
  document.getElementById('saved-badge').style.display = 'none';
  document.getElementById('photo-box').classList.remove('has-photo');
  document.getElementById('check-item').classList.remove('checked');
  document.getElementById('check-circle').textContent = '';
  document.getElementById('done-banner').classList.remove('show');
  updateBtn();
}

// Camera
document.getElementById('btn-camera').addEventListener('click', async function() {
  if (doneTime) return;
  const modal = document.getElementById('camera-modal');
  modal.classList.add('open');
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
    document.getElementById('camera-video').srcObject = cameraStream;
  } catch(err) {
    modal.classList.remove('open');
    alert("カメラを起動できませんでした: " + err.message);
  }
});

function closeCamera() {
  if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
  document.getElementById('camera-modal').classList.remove('open');
}

document.getElementById('btn-cancel-cam').addEventListener('click', closeCamera);

document.getElementById('btn-capture').addEventListener('click', function() {
  const video = document.getElementById('camera-video');
  const canvas = document.getElementById('camera-canvas');
  canvas.width = video.videoWidth || 640;
  canvas.height = video.videoHeight || 480;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
  photoDataUrl = dataUrl;
  try { localStorage.setItem(LS_PHOTO, dataUrl); } catch(e) {}
  showPhotoUI(dataUrl, false, new Date());
  updateBtn();
  closeCamera();
});

// Init
(function() {
  const savedPhoto = (() => { try { return localStorage.getItem(LS_PHOTO); } catch(e) { return null; } })();
  const savedDt = (() => { try { return localStorage.getItem(LS_DATETIME); } catch(e) { return null; } })();
  if (savedPhoto) { photoDataUrl = savedPhoto; showPhotoUI(savedPhoto, true, savedDt ? new Date(savedDt) : null); }
  if (savedDt) {
    doneTime = new Date(savedDt);
    isChecked = true;
    document.getElementById('check-item').classList.add('checked');
    document.getElementById('check-circle').textContent = '✓';
    document.getElementById('done-banner-dt').textContent = fmtDatetime(doneTime) + ' に確認済み';
  }
  updateBtn();
})();
</script>
</body>
</html>
